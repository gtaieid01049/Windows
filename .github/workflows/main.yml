name: Windows-RDP-Tailscale
on: 
  workflow_dispatch: # Allows you to start it manually from the Actions tab

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: 1. Install & Connect Tailscale
        shell: powershell
        run: |
          # Download and Install Tailscale
          $dest = "$env:TEMP\tailscale-setup.exe"
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-latest.exe" -OutFile $dest
          Start-Process -FilePath $dest -ArgumentList "/quiet", "/norestart" -Wait
          
          # Connect to Tailscale (Uses your Secret Key)
          # Make sure you added TAILSCALE_AUTH_KEY to your GitHub Secrets!
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=github-runner
          
          # Display the IP Address for connection
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          Write-Host "-------------------------------------------"
          Write-Host "CONNECT TO THIS IP: $tsIP"
          Write-Host "-------------------------------------------"

      - name: 2. Configure RDP User & Security
        shell: powershell
        run: |
          $User = "RDPAdmin"
          $Pass = "Gamer#2026#Secure!" # Strong password to pass Windows policy
          $SecPass = ConvertTo-SecureString $Pass -AsPlainText -Force

          # Enable RDP in Registry
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue

          # Create User or Update Password if exists
          if (!(Get-LocalUser -Name $User -ErrorAction SilentlyContinue)) {
              New-LocalUser -Name $User -Password $SecPass -FullName "Admin" -Description "RDP Account"
          } else {
              Set-LocalUser -Name $User -Password $SecPass
          }

          # Add to Admin and Remote Desktop Groups
          Add-LocalGroupMember -Group "Administrators" -Member "$User" -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$User" -ErrorAction SilentlyContinue
          
          # Final Success Message
          Write-Host "--- LOGIN DETAILS ---"
          Write-Host "Username: $User"
          Write-Host "Password: $Pass"
          Write-Host "--------------------"

      - name: 3. Keep Runner Alive (6 Hours)
        shell: powershell
        run: |
          Write-Host "The RDP session is live. Do not close this Action."
          Start-Sleep -Seconds 21600 # 6 Hours timer
          
