      - name: Configure New RDP User
        shell: powershell
        run: |
          $NewUser = "Raju"
          $NewPass = "Gamer@2026!"
          
          # Create the new user account
          $PasswordSecure = ConvertTo-SecureString $NewPass -AsPlainText -Force
          New-LocalUser "$NewUser" -Password $PasswordSecure -FullName "Raju Remote" -Description "New RDP Login"
          
          # Add user to Remote Desktop and Admin groups
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "$NewUser"
          Add-LocalGroupMember -Group "Administrators" -Member "$NewUser"

          # Ensure RDP is active
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
          
          Write-Host "NEW LOGIN CREATED:"
          Write-Host "Username: $NewUser"
          Write-Host "Password: $NewPass"
          
